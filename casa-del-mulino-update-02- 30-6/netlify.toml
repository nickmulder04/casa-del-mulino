[build]
  command = "npm run build"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[redirects]]
  from = "https://cellodelmulino.nl/*"
  to = "https://casadelmulino.nl/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://cellodelmulino.nl/*"
  to = "https://casadelmulino.nl/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.casadelmulino.nl/*"
  to = "https://casadelmulino.nl/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.casadelmulino.nl/*"
  to = "https://casadelmulino.nl/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/collectie"
  to = "/index.html#collectie"
  status = 301

[[redirects]]
  from = "/ons-verhaal"
  to = "/ons-verhaal.html"
  status = 200

[[redirects]]
  from = "/onze-belofte"
  to = "/onze-belofte.html"
  status = 200

[[redirects]]
  from = "/serveren"
  to = "/serveren.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
