<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Casa del Mulino CMS</title>
  <style>
    body {
      margin: 0;
      background: #f7efe3;
    }
  </style>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (window.location.hash && /(?:invite_token|confirmation_token|recovery_token|access_token|error)=/.test(window.location.hash)) {
          window.netlifyIdentity.open();
        }
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            window.netlifyIdentity.close();
            document.location.href = "/admin/";
          });
        } else {
          window.netlifyIdentity.close();
        }
      });
    }
  </script>
  <script src="https://unpkg.com/decap-cms@3.6.3/dist/decap-cms.js"></script>
</body>
</html>
